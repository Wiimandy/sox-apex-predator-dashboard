name: Update SOX Apex Predator Dashboard

on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate dashboard
        run: python generate_apex_predator_dashboard.py

      - name: Commit updated dashboard
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update dashboard data"
          file_pattern: index.html apex_predator_dashboard.html
